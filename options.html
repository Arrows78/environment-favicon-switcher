<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Configurer Environment Favicon Switcher</title>
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <main class="options-page">
    <header class="hero">
      <div>
        <p class="eyebrow">Extension navigateur</p>
        <h1>Environment Favicon Switcher</h1>
        <p>Personnalise les favicons par environnement, par domaine ou par expression régulière. Chaque personne peut avoir ses propres règles.</p>
      </div>
      <div class="hero-actions">
        <button id="addRule" class="primary" type="button">Ajouter un environnement</button>
        <button id="exportConfig" type="button">Exporter</button>
        <label class="import-button">Importer<input id="importConfig" type="file" accept="application/json"></label>
      </div>
    </header>

    <section class="settings-grid">
      <label class="setting-card"><input id="enabled" type="checkbox"> Activer l’extension</label>
      <label class="setting-card"><input id="titlePrefixEnabled" type="checkbox"> Ajouter un préfixe au titre de l’onglet</label>
      <label class="setting-card"><input id="reapplyOnChanges" type="checkbox"> Réappliquer si l’application modifie le favicon</label>
      <label class="setting-card"><input id="debug" type="checkbox"> Logs de debug dans la console</label>
    </section>

    <section class="toolbar">
      <input id="search" type="search" placeholder="Filtrer les environnements…">
      <button id="resetDefaults" type="button" class="danger">Réinitialiser</button>
    </section>

    <section id="rulesContainer" class="rules-container" aria-live="polite"></section>

    <template id="ruleTemplate">
      <article class="rule-card">
        <div class="rule-card-header">
          <div class="rule-title">
            <span class="dot"></span>
            <input class="rule-name" aria-label="Nom de l’environnement">
          </div>
          <div class="rule-actions">
            <label><input class="rule-enabled" type="checkbox"> Actif</label>
            <button class="duplicate-rule" type="button">Dupliquer</button>
            <button class="remove-rule danger" type="button">Supprimer</button>
          </div>
        </div>

        <div class="form-grid">
          <label>Label court <input class="rule-label" maxlength="12" placeholder="STAGING"></label>
          <label>Couleur badge <input class="rule-color" type="color"></label>
          <label>Type de correspondance
            <select class="rule-match-type">
              <option value="contains">URL contient</option>
              <option value="hostname">Domaine / sous-domaine</option>
              <option value="regex">Expression régulière</option>
            </select>
          </label>
          <label class="checkbox-field"><input class="rule-keep-original" type="checkbox"> Garder le favicon original</label>
        </div>

        <label>Patterns d’URL, un par ligne
          <textarea class="rule-patterns" rows="3" placeholder="staging.example.com\nreviewapps.example.com"></textarea>
        </label>

        <div class="favicon-row">
          <label>Favicon
            <input class="rule-favicon" placeholder="icons/favicon-staging.ico, https://…, ou data:image/…">
          </label>
          <label class="import-button small">Choisir un fichier<input class="rule-favicon-file" type="file" accept="image/*,.ico"></label>
          <img class="favicon-preview" alt="Aperçu favicon">
        </div>
      </article>
    </template>
  </main>

  <div id="toast" class="toast" role="status"></div>
  <script src="config/defaults.js"></script>
  <script src="src/shared.js"></script>
  <script src="src/options.js"></script>
</body>
</html>
