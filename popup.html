<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="extensionName">Environment Favicon Switcher</title>
  <link rel="stylesheet" href="styles/app.css">
</head>
<body class="popup-body">
  <main class="popup">
    <header class="popup-header">
      <span class="app-icon" aria-hidden="true">
        <img src="icons/icon-48.png" alt="" width="32" height="32">
      </span>
      <div class="popup-heading">
        <h1 data-i18n="extensionShortName">Env Favicon</h1>
        <p id="currentUrl" data-i18n="loading">Loading...</p>
      </div>
    </header>

    <section id="status" class="status-card muted" role="status">
      <span data-i18n="analyzingActiveTab">Analyzing the active tab...</span>
    </section>

    <label class="switch-row">
      <span data-i18n="extensionEnabled">Extension enabled</span>
      <input id="enabledToggle" class="switch-control" type="checkbox" role="switch">
    </label>

    <div class="actions">
      <button id="reapplyButton" type="button">
        <svg class="icon" aria-hidden="true" focusable="false" viewBox="0 0 24 24">
          <path d="M20 6v5h-5"></path>
          <path d="M19 11a7.5 7.5 0 1 0 .2 3"></path>
        </svg>
        <span data-i18n="reapply">Reapply</span>
      </button>
      <button id="optionsButton" type="button" class="primary">
        <svg class="icon" aria-hidden="true" focusable="false" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2.8 2.8-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6v.2h-4V21a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1L4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9A1.7 1.7 0 0 0 3 14H2.8v-4H3a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9L4.2 7 7 4.2l.1.1a1.7 1.7 0 0 0 1.9.3A1.7 1.7 0 0 0 10 3V2.8h4V3a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1L19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1h.2v4H21a1.7 1.7 0 0 0-1.6 1Z"></path>
        </svg>
        <span data-i18n="configure">Configure</span>
      </button>
    </div>

    <details>
      <summary data-i18n="activeEnvironments">Active environments</summary>
      <ul id="rulesList" class="rules-list"></ul>
    </details>
  </main>

  <script src="src/i18n.js"></script>
  <script src="config/defaults.js"></script>
  <script src="src/shared.js"></script>
  <script src="src/popup.js"></script>
</body>
</html>
