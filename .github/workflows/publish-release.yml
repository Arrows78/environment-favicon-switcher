name: Publish Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out repository and tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install project metadata
        run: npm ci

      - name: Inspect the current commit
        id: candidate
        run: node scripts/publish.mjs candidate

      - name: Check for an existing GitHub Release
        id: existing
        if: steps.candidate.outputs.release == 'true'
        env:
          TAG: ${{ steps.candidate.outputs.tag }}
        shell: bash
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate source and run tests
        if: steps.candidate.outputs.release == 'true' && steps.existing.outputs.release != 'true'
        run: npm run validate

      - name: Build the extension twice and compare archives
        id: package
        if: steps.candidate.outputs.release == 'true' && steps.existing.outputs.release != 'true'
        run: npm run package:verify

      - name: Upload workflow artifact
        if: steps.candidate.outputs.release == 'true' && steps.existing.outputs.release != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: environment-favicon-switcher-${{ steps.candidate.outputs.version }}
          path: |
            dist/*.zip
            dist/SHA256SUMS
          if-no-files-found: error

      - name: Attest release provenance
        if: steps.candidate.outputs.release == 'true' && steps.existing.outputs.release != 'true'
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            dist/*.zip
            dist/SHA256SUMS

      - name: Create tag and GitHub Release
        if: steps.candidate.outputs.release == 'true' && steps.existing.outputs.release != 'true'
        env:
          TAG: ${{ steps.candidate.outputs.tag }}
          VERSION: ${{ steps.candidate.outputs.version }}
        shell: bash
        run: |
          notes_file="$(mktemp)"
          node scripts/release.mjs notes --version "$VERSION" > "$notes_file"

          if git rev-parse --verify --quiet "refs/tags/$TAG" > /dev/null; then
            tag_target="$(git rev-list -n 1 "$TAG")"
            if [ "$tag_target" != "$GITHUB_SHA" ]; then
              echo "Tag $TAG already points to $tag_target instead of $GITHUB_SHA." >&2
              exit 1
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" "$GITHUB_SHA" -m "Environment Favicon Switcher $VERSION"
            git push origin "refs/tags/$TAG"
          fi

          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "Environment Favicon Switcher $VERSION" \
            --notes-file "$notes_file" \
            dist/*.zip \
            dist/SHA256SUMS

      - name: Report an already published release
        if: steps.existing.outputs.release == 'true'
        env:
          TAG: ${{ steps.candidate.outputs.tag }}
        run: echo "Release $TAG already exists; publication is idempotently skipped." >> "$GITHUB_STEP_SUMMARY"

      - name: Report a non-release commit
        if: steps.candidate.outputs.release != 'true'
        run: echo "HEAD is not a release commit; no publication is required." >> "$GITHUB_STEP_SUMMARY"
