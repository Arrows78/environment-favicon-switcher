name: Release PR

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_as:
        description: Optional explicit semantic version, for example 3.0.0
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-pr
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN || github.token }}
    steps:
      - name: Check out repository and tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install project metadata
        run: npm ci

      - name: Ignore the release commit itself
        id: release-commit
        if: github.event_name == 'push'
        shell: bash
        run: |
          if git log -1 --format=%B | grep -Eq '(^|[[:space:]])chore\(release\): [0-9]+\.[0-9]+\.[0-9]+'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare release metadata
        id: release
        if: steps.release-commit.outputs.skip != 'true'
        env:
          RELEASE_AS: ${{ inputs.release_as }}
        shell: bash
        run: |
          arguments=(prepare)
          if [ -n "$RELEASE_AS" ]; then
            arguments+=(--release-as "$RELEASE_AS")
          fi
          node scripts/release.mjs "${arguments[@]}"

      - name: Validate the release candidate
        if: steps.release.outputs.release == 'true'
        run: npm run build

      - name: Commit and push the release branch
        if: steps.release.outputs.release == 'true'
        env:
          RELEASE_BRANCH: ${{ steps.release.outputs.release_branch }}
          VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C "$RELEASE_BRANCH"
          git add CHANGELOG.md manifest.json package.json package-lock.json release.config.json
          git commit -m "chore(release): $VERSION"
          git push --force origin "HEAD:refs/heads/$RELEASE_BRANCH"

      - name: Open or refresh the release pull request
        if: steps.release.outputs.release == 'true'
        env:
          RELEASE_BRANCH: ${{ steps.release.outputs.release_branch }}
          VERSION: ${{ steps.release.outputs.version }}
          PREVIOUS_VERSION: ${{ steps.release.outputs.previous_version }}
        shell: bash
        run: |
          body_file="$(mktemp)"
          {
            echo "## Automated release $VERSION"
            echo
            echo "This pull request was generated from Conventional Commits since $PREVIOUS_VERSION."
            echo
            echo "## Release notes"
            echo
            node scripts/release.mjs notes --version "$VERSION"
            echo
            echo "---"
            echo
            echo "Merging this pull request publishes the deterministic extension archive."
          } > "$body_file"

          number="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "$RELEASE_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "$number" ]; then
            gh pr edit "$number" \
              --repo "$GITHUB_REPOSITORY" \
              --title "chore(release): $VERSION" \
              --body-file "$body_file"
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$RELEASE_BRANCH" \
              --title "chore(release): $VERSION" \
              --body-file "$body_file"
          fi

      - name: Report that no release is needed
        if: steps.release-commit.outputs.skip != 'true' && steps.release.outputs.release != 'true'
        run: echo "No release-worthy Conventional Commit was found." >> "$GITHUB_STEP_SUMMARY"
