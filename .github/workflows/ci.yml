name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate on Node.js ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node:
          - 22
          - 24
          - 26
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install project metadata
        run: npm ci

      - name: Validate source and run tests
        run: npm run validate

  package:
    name: Verify reproducible extension package
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install project metadata
        run: npm ci

      - name: Build twice and compare archives
        run: npm run package:verify

      - name: Upload extension archive and checksum
        uses: actions/upload-artifact@v7
        with:
          name: environment-favicon-switcher-${{ github.sha }}
          path: |
            dist/*.zip
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 14
